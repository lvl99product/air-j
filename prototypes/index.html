<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>air-J | Mobile Planning UX Prototypes</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            padding: 40px; 
            background-color: #0B1120; 
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            text-align: center;
        }
        h1 { font-family: 'Outfit', sans-serif; font-size: 32px; margin-bottom: 8px; }
        p { color: #94A3B8; margin-bottom: 40px; }
        
        .showcase {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        .device-mockup {
            width: 375px;
            height: 812px;
            border-radius: 40px;
            border: 12px solid #1E293B;
            background: #0B1120;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        /* Notch */
        .device-mockup::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #1E293B;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 100;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .opt-label {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #2DD4BF;
        }
    </style>
</head>
<body>
    <h1>Mobile Scrum Planning UX Options</h1>
    <p>Review the three distinct approaches to handling mobile sprint planning.</p>
    
    <div class="showcase">
        <div>
            <div class="opt-label">Option 1: Native Tabs</div>
            <div class="device-mockup">
                <iframe src="opt1.html"></iframe>
            </div>
        </div>
        
        <div>
            <div class="opt-label">Option 2: Sprint Cart</div>
            <div class="device-mockup">
                <iframe src="opt2.html"></iframe>
            </div>
        </div>
        
        <div>
            <div class="opt-label">Option 3: Planning Wizard</div>
            <div class="device-mockup">
                <iframe src="opt3.html"></iframe>
            </div>
        </div>
    </div>
</body>
</html>
